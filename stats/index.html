<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stats | Find That Scene</title>

  <link rel="preconnect" href="https://images.pixieset.com">
  <link rel="stylesheet" href="./stats.css" />
</head>
<body>
  <main class="stats-shell">
    <section class="stats-hero">
      <div class="stats-hero-main">
        <img
          class="stats-logo"
          src="https://images.pixieset.com/063553411/cfaf06b0cd6b6cf0468956939122a80b-xxlarge.PNG"
          alt="Find That Scene"
        />

        <div>
          <h1>Stats</h1>
          <p>
            Project mode starts July 2025. Earlier dates stay counted elsewhere, but the main stats here focus on the proper scene-hunting era.
          </p>
        </div>
      </div>

      <nav class="stats-nav" aria-label="Stats navigation">
        <a class="btn btn-secondary" href="../explore/">Map view</a>
        <a class="btn btn-primary" href="../browse/">Browse view</a>
      </nav>
    </section>

    <div id="statsLoading" class="loading-card">Loading stats…</div>
    <div id="statsRoot" style="display:none;"></div>
  </main>

  <script src="../config.js"></script>
  <script src="./stats.js"></script>
</body>
</html>

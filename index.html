<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Find That Scene</title>

  <link rel="preconnect" href="https://images.pixieset.com">
  <link rel="stylesheet" href="./home.css" />
</head>
<body>
  <main class="home-shell">
    <section class="hero">
      <img
        class="hero-logo"
        src="https://images.pixieset.com/063553411/cfaf06b0cd6b6cf0468956939122a80b-xxlarge.PNG"
        alt="Find That Scene"
      />

      <p class="hero-copy">
        Exploring the real world locations behind films, TV, games and music videos. From filming spots to the places that inspired CGI worlds.
      </p>

      <nav class="hero-actions" aria-label="Main navigation">
        <a class="btn btn-secondary" href="./browse/">
          <span aria-hidden="true">⌕</span>
          Browse
        </a>

        <a class="btn btn-primary" href="./explore/">
          <span aria-hidden="true">✦</span>
          Map
        </a>
      </nav>
    </section>

    <section id="railsRoot" class="rails-root" aria-live="polite">
      <div class="loading-card">Loading rails…</div>
    </section>


    <section class="home-stats-section" style="display:none;">
      <h2 class="rail-title">Project stats at a glance</h2>

      <div id="homeStats" class="stats-grid" aria-live="polite">
        <article class="stat-card">
          <div class="stat-value">—</div>
          <div class="stat-label">Scenes visited</div>
        </article>

        <article class="stat-card">
          <div class="stat-value">—</div>
          <div class="stat-label">Titles</div>
        </article>

        <article class="stat-card">
          <div class="stat-value">—</div>
          <div class="stat-label">Cities</div>
        </article>

        <article class="stat-card">
          <div class="stat-value">—</div>
          <div class="stat-label">Countries</div>
        </article>
      </div>
    </section>

    <a class="more-stats" href="./stats/">View more stats</a>
  
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const mapParams = ["q", "tab", "fk", "fl", "loc", "rm", "mlat", "mlng", "mz"];
      const shouldRedirect = mapParams.some((key) => params.has(key));

      if (shouldRedirect) {
        window.location.replace("./explore/" + window.location.search);
      }
    })();
  </script>

  <script src="./config.js"></script>
  <script src="./home.js"></script>
</body>
</html>

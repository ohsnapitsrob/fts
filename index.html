<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Find That Scene</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f5f7f7;
      color: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }

    .card {
      width: min(460px, 100%);
      padding: 32px;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.10);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: #4b5563;
      line-height: 1.5;
    }

    a {
      color: #5A00E6;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hello world</h1>
    <p>
     This is a holding page.
    </p>
  </main>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Find That Scene</title>

  <link rel="preconnect" href="https://images.pixieset.com">
  <link rel="stylesheet" href="./home.css" />
</head>
<body>
  <main class="home-shell">
    <section class="hero-card">
      <div class="hero-logo-wrap">
        <img
          class="hero-logo"
          src="https://images.pixieset.com/063553411/cfaf06b0cd6b6cf0468956939122a80b-xxlarge.PNG"
          alt="Find That Scene"
        />
      </div>

      <p class="hero-copy">
        Helping people discover real filming, music video, TV, game and inspiration locations on a map.
      </p>

      <nav class="home-actions" aria-label="Main navigation">
        <a class="btn btn-secondary" href="./browse/">
          <span class="btn-icon" aria-hidden="true">⌕</span>
          Browse
        </a>

        <a class="btn btn-primary" href="./explore/">
          <span class="btn-icon" aria-hidden="true">⌖</span>
          Map
        </a>
      </nav>

      <section id="homeStats" class="stats-grid" aria-live="polite">
        <article class="stat-card">
          <div class="stat-value">—</div>
          <div class="stat-label">Scenes</div>
        </article>

        <article class="stat-card">
          <div class="stat-value">—</div>
          <div class="stat-label">Titles</div>
        </article>

        <article class="stat-card">
          <div class="stat-value">—</div>
          <div class="stat-label">Cities</div>
        </article>

        <article class="stat-card">
          <div class="stat-value">—</div>
          <div class="stat-label">Countries</div>
        </article>
      </section>

      <a class="more-stats" href="./stats/">View more stats</a>
    </section>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const mapParams = ["q", "tab", "fk", "fl", "loc", "rm", "mlat", "mlng", "mz"];
      const shouldRedirect = mapParams.some((key) => params.has(key));

      if (shouldRedirect) {
        window.location.replace("./explore/" + window.location.search);
      }
    })();
  </script>

  <script src="./config.js"></script>
  <script src="./home.js"></script>
</body>
</html>
